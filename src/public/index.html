<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciador de Produtos</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="container-header">
        <h1>📦 Gerenciador de Produtos</h1>
        <p class="subtitle">Aplicação de Gestão de Produtos</p>
      </div>
    </header>

    <main>
      <div class="container">

        <!-- FORMULÁRIO -->
        <section class="form-section">
          <h2>Adicionar ou Editar Produto</h2>
          <form id="productForm">

            <div class="form-group">
              <label for="nome">Nome:</label>
              <input
                type="text"
                id="nome"
                name="nome"
                placeholder="Digite o nome do produto"
                required
              />
            </div>

            <div class="form-group">
              <label for="preco">Preço:</label>
              <input
                type="number"
                step="0.01"
                id="preco"
                name="preco"
                placeholder="Ex: 99.90"
                required
              />
            </div>

            <div class="form-group">
              <label for="estoque">Estoque:</label>
              <input
                type="number"
                id="estoque"
                name="estoque"
                placeholder="Quantidade em estoque"
                required
              />
            </div>

            <div class="form-group">
              <label for="categoria">Categoria:</label>
              <input
                type="text"
                id="categoria"
                name="categoria"
                placeholder="Ex: Eletrônicos"
                required
              />
            </div>

            <div class="form-buttons">
              <button type="submit" class="btn btn-primary">
                Salvar Produto
              </button>
              <button type="button" class="btn btn-secondary" id="btnLimpar">
                Limpar Formulário
              </button>
            </div>

          </form>
        </section>

        <!-- LISTAGEM -->
        <section class="list-section">
          <h2>Lista de Produtos</h2>

          <div class="list-controls">
            <button class="btn btn-success" id="btnRecarregar">
              🔄 Recarregar Lista
            </button>

            <div class="search-box">
              <select id="searchType">
                <option value="nome">Buscar por Nome</option>
                <option value="id">Buscar por ID</option>
              </select>

              <input
                type="text"
                id="searchInput"
                placeholder="Digite para buscar..."
              />

              <button class="btn btn-primary" id="btnBuscar">Buscar</button>
            </div>
          </div>

          <div id="loadingMessage" class="message message-info">
            Carregando produtos...
          </div>

          <div id="emptyMessage" class="message message-info">
            Nenhum produto cadastrado.
          </div>

          <div id="productsList" class="clients-table-container">
            <!-- tabela via JS -->
          </div>

        </section>
      </div>
    </main>

    <footer>
      <p>
        &copy; 2026 - Sistema de Gestão de Produtos
      </p>
    </footer>

    <!-- MODAL -->
    <div id="modalMessage" class="modal-message">
      <div class="modal-content">
        <p id="modalText"></p>
        <button class="btn btn-primary" onclick="fecharModal()">Fechar</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
